name: Pobierz dane Veturilo
 
on:
  schedule:
    - cron: '0 * * * *'   # co godzinę, o pełnej
  workflow_dispatch:        # możliwość uruchomienia ręcznie z panelu GitHub
 
permissions:
  contents: write
 
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4
 
      - name: Uruchom kolektor
        run: python3 collector.py
 
      - name: Zapisz dane do repozytorium
        run: |
          git config user.name  "veturilo-bot"
          git config user.email "bot@veturilo"
          git add data.json
          git diff --cached --quiet || git commit -m "dane: $(date '+%Y-%m-%d %H:%M')"
          git push
 
